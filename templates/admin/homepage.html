<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage Editor — Siam Munkasir Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--bg2:#0f0f1a;--card:#12121f;--border:#2a2a3e;--text:#e0e0e8;--text2:#a0a0b8;--text3:#666688;--accent1:#3B82F6;--accent2:#8B5CF6;--accent3:#06B6D4;--font:'Inter',sans-serif;--radius:12px;--radius-lg:20px}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--card);border-right:1px solid var(--border);padding:24px 16px;position:fixed;left:0;top:0;overflow-y:auto;z-index:10}
.sidebar h2{font-size:18px;font-weight:800;margin-bottom:28px;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar .section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 6px 14px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius);color:var(--text2);font-size:13px;text-decoration:none;transition:.3s;margin-bottom:2px}
.sidebar a:hover,.sidebar a.active{background:rgba(59,130,246,.1);color:var(--accent1)}
.sidebar a i{width:18px;text-align:center;font-size:14px}
.sidebar .logout{margin-top:20px;border-top:1px solid var(--border);padding-top:16px;color:var(--accent1)!important}
.main{flex:1;padding:28px 32px;min-width:0;max-width:calc(100% - 240px)}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.main-header h1{font-size:22px;font-weight:700}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:20px}
.section-card h2{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:.3s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent1)}
.form-group textarea{min-height:60px;resize:vertical;font-size:12px}
.stats-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.stats-item input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;font-family:var(--font);outline:none}
.stats-item input:focus{border-color:var(--accent1)}
.stats-item .remove-btn{background:rgba(239,68,68,.15);border:none;color:#ef4444;width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;transition:.3s;border:none;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(59,130,246,.1);color:var(--accent1)}
.btn-sm{padding:5px 12px;font-size:11px}
.top-actions{display:flex;gap:8px;margin-bottom:20px}
@media(max-width:768px){
  .sidebar{width:56px;padding:16px 6px}
  .sidebar h2,.sidebar a span,.sidebar .section-label{display:none}
  .sidebar a{justify-content:center;padding:8px}
  .main{margin-left:56px;padding:16px}
  .form-row{grid-template-columns:1fr}
}
.toast{position:fixed;bottom:24px;right:24px;background:#10b981;color:#fff;padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:100;display:none;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
{% include 'admin/_sidebar.html' %}
<div class="main">
  <div class="main-header">
    <h1><i class="fas fa-home" style="color:var(--accent1);margin-right:8px"></i>Homepage Editor</h1>
    <div class="top-actions">
      <button class="btn btn-primary" onclick="saveAll()"><i class="fas fa-save"></i> Save All Changes</button>
      <a href="/" target="_blank" class="btn btn-secondary"><i class="fas fa-external-link-alt"></i> Preview</a>
    </div>
  </div>

  <div id="heroSection" class="section-card">
    <h2><i class="fas fa-star" style="color:var(--accent2)"></i> Hero Section</h2>
    <div class="form-group">
      <label>Headline</label>
      <input type="text" id="hero_headline" value="" />
    </div>
    <div class="form-group">
      <label>Subheadline</label>
      <input type="text" id="hero_subheadline" value="" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="hero_description" rows="3"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group"><label>CTA Button Text</label><input type="text" id="hero_cta_text" /></div>
      <div class="form-group"><label>CTA Link</label><input type="text" id="hero_cta_link" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Secondary CTA Text</label><input type="text" id="hero_secondary_cta_text" /></div>
      <div class="form-group"><label>Secondary CTA Link</label><input type="text" id="hero_secondary_cta_link" /></div>
    </div>
    <div class="form-group">
      <label>Hero Image URL</label>
      <input type="text" id="hero_hero_image" placeholder="https://..." />
      <div style="margin-top:4px"><a href="/admin/media" target="_blank" style="color:var(--accent1);font-size:11px">Choose from Media Library</a></div>
    </div>
  </div>

  <div class="section-card">
    <h2><i class="fas fa-chart-bar" style="color:var(--accent3)"></i> Statistics Bar</h2>
    <div id="statsList"></div>
    <button class="btn btn-secondary btn-sm" onclick="addStatItem()"><i class="fas fa-plus"></i> Add Stat</button>
  </div>

  <div class="section-card">
    <h2><i class="fas fa-cog" style="color:var(--accent1)"></i> Services Section Heading</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="services_title" />
    </div>
    <div class="form-group">
      <label>Subtitle</label>
      <input type="text" id="services_subtitle" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="services_description" rows="2"></textarea>
    </div>
  </div>

  <div class="section-card">
    <h2><i class="fas fa-info-circle" style="color:var(--accent2)"></i> About Preview</h2>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="about_title" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="about_content" rows="4"></textarea>
    </div>
    <div class="form-group">
      <label>Image URL</label>
      <input type="text" id="about_image" placeholder="https://..." />
    </div>
    <div class="form-row">
      <div class="form-group"><label>Button Text</label><input type="text" id="about_button_text" /></div>
      <div class="form-group"><label>Button Link</label><input type="text" id="about_button_link" /></div>
    </div>
  </div>
</div>

<div id="toast" class="toast">✓ Changes saved!</div>

<script>
// Data from server
var INIT_DATA = {{ sections|tojson }};

function initForm() {
  // Hero
  var hero = INIT_DATA.hero || {};
  try { if (typeof hero === 'string') hero = JSON.parse(hero); } catch(e) { hero = {}; }
  document.getElementById('hero_headline').value = hero.headline || '';
  document.getElementById('hero_subheadline').value = hero.subheadline || '';
  document.getElementById('hero_description').value = hero.description || '';
  document.getElementById('hero_cta_text').value = hero.cta_text || '';
  document.getElementById('hero_cta_link').value = hero.cta_link || '';
  document.getElementById('hero_secondary_cta_text').value = hero.secondary_cta_text || '';
  document.getElementById('hero_secondary_cta_link').value = hero.secondary_cta_link || '';
  document.getElementById('hero_hero_image').value = hero.hero_image || '';

  // Stats
  var stats = INIT_DATA.stats || [];
  try { if (typeof stats === 'string') stats = JSON.parse(stats); } catch(e) { stats = []; }
  var container = document.getElementById('statsList');
  container.innerHTML = '';
  if (stats.length === 0) { stats = [{label:'Projects Completed',value:'150+',icon:'fa-check-circle'},{label:'Happy Clients',value:'50+',icon:'fa-smile'}]; }
  stats.forEach(function(s) { addStatItem(s.label, s.value, s.icon); });

  // Services heading
  var svc = INIT_DATA.services_heading || {};
  try { if (typeof svc === 'string') svc = JSON.parse(svc); } catch(e) { svc = {}; }
  document.getElementById('services_title').value = svc.title || '';
  document.getElementById('services_subtitle').value = svc.subtitle || '';
  document.getElementById('services_description').value = svc.description || '';

  // About
  var about = INIT_DATA.about_preview || {};
  try { if (typeof about === 'string') about = JSON.parse(about); } catch(e) { about = {}; }
  document.getElementById('about_title').value = about.title || '';
  document.getElementById('about_content').value = about.content || '';
  document.getElementById('about_image').value = about.image || '';
  document.getElementById('about_button_text').value = about.button_text || '';
  document.getElementById('about_button_link').value = about.button_link || '';
}
initForm();

function addStatItem(label, value, icon) {
  var container = document.getElementById('statsList');
  var i = container.children.length;
  var div = document.createElement('div');
  div.className = 'stats-item';
  div.innerHTML = '<input type="text" class="stat-label" placeholder="Label" value="' + (label||'') + '" />' +
    '<input type="text" class="stat-value" placeholder="Value" value="' + (value||'') + '" style="max-width:100px" />' +
    '<input type="text" class="stat-icon" placeholder="Icon class" value="' + (icon||'fa-star') + '" style="max-width:120px" />' +
    '<button class="remove-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
  container.appendChild(div);
}

function saveAll() {
  var data = {};

  // Hero
  data.hero = {
    headline: document.getElementById('hero_headline').value,
    subheadline: document.getElementById('hero_subheadline').value,
    description: document.getElementById('hero_description').value,
    cta_text: document.getElementById('hero_cta_text').value,
    cta_link: document.getElementById('hero_cta_link').value,
    secondary_cta_text: document.getElementById('hero_secondary_cta_text').value,
    secondary_cta_link: document.getElementById('hero_secondary_cta_link').value,
    hero_image: document.getElementById('hero_hero_image').value
  };

  // Stats
  var stats = [];
  document.querySelectorAll('.stats-item').forEach(function(el) {
    var inputs = el.querySelectorAll('input');
    stats.push({ label: inputs[0].value, value: inputs[1].value, icon: inputs[2].value });
  });
  data.stats = stats;

  // Services heading
  data.services_heading = {
    title: document.getElementById('services_title').value,
    subtitle: document.getElementById('services_subtitle').value,
    description: document.getElementById('services_description').value
  };

  // About
  data.about_preview = {
    title: document.getElementById('about_title').value,
    content: document.getElementById('about_content').value,
    image: document.getElementById('about_image').value,
    button_text: document.getElementById('about_button_text').value,
    button_link: document.getElementById('about_button_link').value
  };

  fetch('/admin/homepage/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r){return r.json()}).then(function(d){
    if (d.success) {
      var toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(function(){ toast.style.display = 'none'; }, 3000);
    }
  });
}
</script>
</body>
</html>
