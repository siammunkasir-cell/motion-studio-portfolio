<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Services — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>:root{--bg:#0a0a12;--card:#12121f;--border:#2a2a3e;--text:#e0e0e8;--text2:#a0a0b8;--text3:#666688;--accent1:#ff6b6b;--accent2:#ffd93d;--font:'Inter',sans-serif;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex}
.sidebar{width:240px;min-height:100vh;background:var(--card);border-right:1px solid var(--border);padding:24px 16px;position:fixed}
.sidebar h2{font-size:18px;font-weight:800;margin-bottom:32px;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius);color:var(--text2);font-size:14px;text-decoration:none;transition:.3s}
.sidebar a:hover,.sidebar a.active{background:rgba(255,107,107,.1);color:var(--accent1)}
.main{flex:1;margin-left:240px;padding:32px}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.main-header h1{font-size:24px;font-weight:700}
.btn-add,.btn-save{padding:10px 20px;border-radius:100px;border:none;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:var(--bg);font-weight:600;cursor:pointer;font-family:var(--font)}
.add-form,.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.add-form h3{margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent1)}
.btn-delete{padding:6px 14px;border-radius:100px;border:1px solid rgba(255,107,107,.3);background:transparent;color:var(--accent1);font-size:12px;cursor:pointer;font-family:var(--font)}
.item-card{display:flex;justify-content:space-between;align-items:flex-start}
.item-info h4{font-size:15px;margin-bottom:4px}
.item-info p{color:var(--text2);font-size:13px}
.item-info small{color:var(--text3);font-size:12px}
</style>
</head>
<body>
<div class="sidebar">
  <h2>Siam Munkasir</h2>
  <a href="/admin"><i class="fas fa-chart-pie"></i> Dashboard</a>
  <a href="/admin/inquiries"><i class="fas fa-inbox"></i> Inquiries</a>
  <a href="/admin/portfolio"><i class="fas fa-images"></i> Portfolio</a>
  <a href="/admin/testimonials"><i class="fas fa-quote-right"></i> Testimonials</a>
  <a href="/admin/services" class="active"><i class="fas fa-cog"></i> Services</a>
  <a href="/admin/settings"><i class="fas fa-sliders-h"></i> Settings</a>
  <a href="/admin/logout" style="margin-top:32px;color:var(--accent1)"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="main">
  <div class="main-header"><h1>Services</h1><button onclick="this.nextElementSibling.style.display='block'" class="btn-add">+ Add</button></div>
  <div class="add-form" style="display:none">
    <h3>Add Service</h3>
    <form method="post" action="/admin/services/add">
      <div class="form-group"><label>Title *</label><input type="text" name="title" required></div>
      <div class="form-group"><label>Description</label><textarea name="description" rows="2"></textarea></div>
      <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Icon (FontAwesome class)</label><input type="text" name="icon" placeholder="fas fa-film"></div>
        <div><label>Price</label><input type="text" name="price" placeholder="From $500"></div>
      </div>
      <div class="form-group"><label>Features (comma separated)</label><textarea name="features" rows="2" placeholder="2D/3D Animation, Kinetic Typography, Logo Animation"></textarea></div>
      <button type="submit" class="btn-save">Save</button>
    </form>
  </div>
  {% for item in items %}
  <div class="item-card">
    <div class="item-info">
      <h4>{{ item.title }}</h4>
      <p>{{ item.description[:100] }}</p>
      <small>{{ item.price or '' }} {{ item.icon or '' }}</small>
    </div>
    <form method="post" action="/admin/services/{{ item.id }}/delete" onsubmit="return confirm('Delete?')">
      <button class="btn-delete"><i class="fas fa-trash"></i></button>
    </form>
  </div>
  {% else %}
  <p style="color:var(--text3);text-align:center;padding:40px">No services yet.</p>
  {% endfor %}
</div>
</body>
</html>
