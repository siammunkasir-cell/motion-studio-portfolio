<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — BrandFit Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090B;--bg2:#111827;--card:#0F172A;--border:#1E293B;--text:#F8FAFC;--text2:#94A3B8;--accent1:#3B82F6;--accent2:#8B5CF6;--font:'Inter',sans-serif;--radius:12px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-container{width:400px;max-width:90vw;padding:40px 32px;background:var(--card);border:1px solid var(--border);border-radius:20px}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-logo p{color:var(--text2);font-size:14px;margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:.3s;font-family:var(--font)}
.form-group input:focus{border-color:var(--accent1);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn-submit{width:100%;padding:14px;border:none;border-radius:100px;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:var(--bg);font-size:15px;font-weight:600;cursor:pointer;transition:.3s;font-family:var(--font)}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.3)}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:12px;border-radius:var(--radius);margin-bottom:16px;font-size:13px;display:none}
@media(max-width:480px){
  .login-container{padding:28px 20px}
  .login-logo h1{font-size:24px}
  .login-logo p{font-size:13px}
  .form-group input{padding:14px 16px;font-size:16px}
  .btn-submit{padding:15px;font-size:15px}
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-logo">
    <h1>BrandFit Media</h1>
    <p>Admin Dashboard</p>
  </div>
  <div class="error" id="errorMsg"></div>
  <form id="loginForm">
    <div class="form-group"><label>Username</label><input type="text" name="username" value="admin" required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="admin123" required></div>
    <button type="submit" class="btn-submit">Sign In <i class="fas fa-arrow-right"></i></button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async(e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = await fetch('/admin/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:fd.get('username'), password:fd.get('password')})});
  if(res.ok) window.location.href = '/admin';
  else {
    const err = document.getElementById('errorMsg');
    err.textContent = 'Invalid credentials. Try admin / admin123';
    err.style.display = 'block';
  }
});
</script>
</body>
</html>
