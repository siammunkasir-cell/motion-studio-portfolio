<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — BrandFit Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--bg:#0a0a12;--bg2:#0f0f1a;--card:#151525;--border:#1e1e35;--text:#f0f0f5;--text2:#a0a0b8;--text3:#6b6b80;--accent1:#ff6b6b;--accent2:#ffd93d;--radius:8px;--radius-lg:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center}
.login-box .logo{font-size:36px;margin-bottom:12px;color:var(--accent1)}
.login-box h1{font-size:24px;margin-bottom:4px}
.login-box p{color:var(--text2);font-size:14px;margin-bottom:24px}
.login-box input{width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;margin-bottom:12px;outline:none;font-family:inherit}
.login-box input:focus{border-color:var(--accent1)}
.login-box .error{color:var(--accent1);font-size:13px;margin-bottom:8px;display:none}
.login-box button{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent1),#e55555);border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-box .hint{font-size:12px;color:var(--text3);margin-top:16px;line-height:1.5}
.login-box .hint a{color:var(--accent1);text-decoration:none}
.login-box .hint a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">◆</div>
  <h1>Admin Login</h1>
  <p>BrandFit Media</p>
  <input type="text" id="username" placeholder="Username" autocomplete="username">
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  <div class="error" id="loginError">Invalid credentials</div>
  <button id="loginBtn">Sign In</button>
  <div class="hint">
    <a href="/"><i class="fas fa-arrow-left"></i> Back to Site</a>
    <br>Default: admin / admin123
  </div>
</div>
<script>
document.getElementById('loginBtn').addEventListener('click', function(){
  var user = document.getElementById('username').value.trim();
  var pass = document.getElementById('password').value;
  if(!user || !pass){
    document.getElementById('loginError').textContent = 'Enter username and password';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Signing in...';
  document.getElementById('loginError').style.display = 'none';
  fetch('/admin/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: user, password: pass})
  }).then(function(r){
    if(r.ok || r.redirected){
      window.location.href = '/admin';
    } else {
      return r.json().then(function(d){
        throw new Error(d.error || 'Invalid credentials');
      });
    }
  }).catch(function(e){
    document.getElementById('loginError').textContent = e.message;
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginBtn').textContent = 'Sign In';
  });
});
document.getElementById('password').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('loginBtn').click();
});
document.getElementById('username').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('loginBtn').click();
});
</script>
</body>
</html>
